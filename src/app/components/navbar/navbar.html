<nav class="bg-white shadow-sm border-b border-gray-200">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 justify-between">
      <!-- Left side - Logo and Navigation -->
      <div class="flex">
        <!-- Logo -->
        <div class="flex flex-shrink-0 items-center">
          <button
            class="md:hidden p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500"
            (click)="toggleMobileMenu()">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
            </svg>
          </button>
          <svg class="h-8 w-8 text-indigo-600 ml-2 md:ml-0" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
          <span class="ml-2 text-xl font-bold text-gray-900">Require4Testing</span>
        </div>

        <!-- Desktop Navigation -->
        <div class="hidden md:ml-6 md:flex md:space-x-8">
          @for (item of navigationItems; track navigationItems) {
            <a
              [routerLink]="item.href"
              routerLinkActive="border-indigo-500 text-gray-900"
              [routerLinkActiveOptions]="{exact: item.href === '/'}"
              class="inline-flex items-center border-b-2 border-transparent px-1 pt-1 text-sm font-medium text-gray-500 hover:border-gray-300 hover:text-gray-700 transition-colors duration-200">
              {{ item.name }}
            </a>
          }
        </div>
      </div>

      <!-- Right side - Notifications and Profile -->
      <div class="flex items-center space-x-4">
        <!-- Notifications -->
        <button
          type="button"
          class="relative rounded-full bg-white p-1 text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          <span class="sr-only">View notifications</span>
          <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/>
          </svg>
          <!-- Notification badge -->
          <span
            class="absolute -top-1 -right-1 block h-4 w-4 rounded-full bg-red-400 text-xs font-medium text-white text-center leading-4">3</span>
        </button>

        <!-- Profile dropdown -->
        <div class="relative">
          <button
            type="button"
            (click)="toggleProfileMenu()"
            class="flex rounded-full bg-white text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
            [attr.aria-expanded]="isProfileMenuOpen()"
            aria-haspopup="true">
            <span class="sr-only">Open user menu</span>
            <div
              class="h-8 w-8 rounded-full bg-gradient-to-r from-purple-400 to-pink-400 flex items-center justify-center">
              <span class="text-sm font-medium text-white">JD</span>
            </div>
          </button>

          <!-- Profile dropdown menu -->
          @if (isProfileMenuOpen()) {
            <div
              class="absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none"
              role="menu"
              aria-orientation="vertical"
              aria-labelledby="user-menu-button"
              tabindex="-1">
              <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Your
                Profile</a>
              <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem">Settings</a>
              <a href="#" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100" role="menuitem"
                 (click)="signout()">Sign out</a>
            </div>
          }
        </div>
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
    <div class="md:hidden">
      <div class="space-y-1 pb-3 pt-2">
        @for (item of navigationItems; track navigationItems) {
          <a
            [routerLink]="item.href"
            routerLinkActive="bg-indigo-50 border-indigo-500 text-indigo-700"
            [routerLinkActiveOptions]="{exact: item.href === '/'}"
            class="block border-l-4 border-transparent py-2 pl-3 pr-4 text-base font-medium text-gray-500 hover:border-gray-300 hover:bg-gray-50 hover:text-gray-700 transition-colors duration-200"
            (click)="closeMobileMenu()">
            {{ item.name }}
          </a>

        }
      </div>
    </div>
  }
</nav>
